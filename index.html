<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Upgrade Stars • Gift Upgrade Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #06080d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            position: fixed;
            width: 100%;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0a0f1a;
            box-shadow: 0 0 60px rgba(100, 100, 255, 0.15), 0 0 120px rgba(100, 100, 255, 0.05);
            overflow: hidden;
        }

        .header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d111f;
            border-bottom: 1px solid #1e2a45;
            z-index: 10;
            flex-shrink: 0;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .balance-container {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #111827;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #2a3a5c;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .balance-container:active {
            background: #1a2540;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
        }

        .star-icon {
            font-size: 16px;
            filter: drop-shadow(0 0 4px #ffd700);
        }

        .balance {
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .inventory-btn {
            background: #111827;
            border: none;
            color: #a0b4e0;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #2a3a5c;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(100, 140, 255, 0.1);
        }

        .inventory-btn:active {
            background: #1a2540;
            box-shadow: 0 0 20px rgba(100, 140, 255, 0.25);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            gap: 10px;
            min-height: 0;
            overflow-y: auto;
        }

        .gift-selection-row {
            display: flex;
            gap: 10px;
            width: 100%;
            align-items: stretch;
        }

        .gift-card {
            flex: 1;
            background: #0d111f;
            border: 1px solid #1e2a45;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-width: 0;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .gift-card.current-gift {
            border-color: #3fb95060;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.2);
        }

        .gift-card.target-gift {
            border-color: #f0883e60;
            box-shadow: 0 0 20px rgba(240, 136, 62, 0.2);
        }

        .gift-emoji {
            font-size: 36px;
            line-height: 1;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }

        .gift-name {
            color: #d0daf0;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-shadow: 0 0 8px rgba(200, 210, 255, 0.2);
        }

        .gift-price {
            color: #ffd700;
            font-size: 11px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .wheel-container {
            position: relative;
            width: 190px;
            height: 190px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 30px rgba(100, 140, 255, 0.2));
        }

        .wheel-canvas {
            width: 100%;
            height: 100%;
        }

        .spark-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            pointer-events: none;
            z-index: 5;
        }

        .center-result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .center-result.show {
            opacity: 1;
        }

        .center-result-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: result-pop 0.4s ease-out;
        }

        @keyframes result-pop {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            60% {
                transform: scale(1.2);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .center-result-chance {
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
            opacity: 0.8;
        }

        .chance-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 4;
            transition: opacity 0.3s ease;
        }

        .chance-display.hidden-temp {
            opacity: 0;
        }

        .chance-percent {
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .chance-label {
            font-size: 10px;
            color: #6b7daa;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(100, 140, 255, 0.3);
        }

        .quick-bet-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .quick-bet-btn {
            background: #111827;
            border: 1px solid #2a3a5c;
            color: #a0b4e0;
            padding: 7px 11px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
            text-shadow: 0 0 6px rgba(160, 180, 224, 0.3);
        }

        .quick-bet-btn:active {
            background: #1a2540;
            box-shadow: 0 0 18px rgba(100, 140, 255, 0.3);
        }

        .quick-bet-btn.active {
            border-color: #ffd700;
            color: #ffd700;
            background: #1a2540;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .upgrade-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #1a3a2a, #238636);
            color: white;
            border: 1px solid #2ea04380;
            transition: all 0.25s;
            box-shadow: 0 0 25px rgba(46, 160, 67, 0.3), 0 0 50px rgba(46, 160, 67, 0.1);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .upgrade-btn:active {
            background: linear-gradient(135deg, #238636, #2ea043);
            transform: scale(0.98);
            box-shadow: 0 0 40px rgba(46, 160, 67, 0.5);
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 0 15px rgba(46, 160, 67, 0.1);
        }

        .upgrade-btn.spinning {
            background: linear-gradient(135deg, #5a2a10, #c0501e);
            border-color: #f0883e;
            animation: neon-pulse 0.6s ease-in-out infinite;
            text-shadow: 0 0 8px rgba(255, 200, 100, 0.5);
        }

        @keyframes neon-pulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(240, 136, 62, 0.4), 0 0 60px rgba(240, 136, 62, 0.15);
            }
            50% {
                box-shadow: 0 0 50px rgba(240, 136, 62, 0.7), 0 0 90px rgba(240, 136, 62, 0.3);
            }
        }

        .lists-row {
            display: flex;
            gap: 10px;
            width: 100%;
            flex: 1;
            min-height: 120px;
            overflow: hidden;
        }

        .gift-list-panel {
            flex: 1;
            background: #0d111f;
            border: 1px solid #1e2a45;
            border-radius: 10px;
            overflow-y: auto;
            scrollbar-width: thin;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .gift-list-panel::-webkit-scrollbar {
            width: 3px;
        }
        .gift-list-panel::-webkit-scrollbar-thumb {
            background: #1e2a45;
            border-radius: 3px;
            box-shadow: 0 0 5px rgba(100, 140, 255, 0.2);
        }

        .gift-list-title {
            padding: 8px 10px;
            color: #6b7daa;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #1a2540;
            position: sticky;
            top: 0;
            background: #0d111f;
            z-index: 1;
            text-shadow: 0 0 8px rgba(100, 140, 255, 0.2);
        }

        .gift-list-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #0a0f1a;
        }

        .gift-list-item:hover,
        .gift-list-item:active {
            background: #111827;
            box-shadow: inset 0 0 15px rgba(100, 140, 255, 0.05);
        }

        .gift-list-item .gift-emoji-small {
            font-size: 24px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .gift-list-item-info {
            flex: 1;
            min-width: 0;
        }

        .gift-list-item-name {
            color: #d0daf0;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 5px rgba(200, 210, 255, 0.15);
        }

        .gift-list-item-price {
            color: #ffd700;
            font-size: 10px;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.25);
        }

        .sell-icon-btn {
            background: #3f1a1a;
            border: 1px solid #f8514960;
            color: #f85149;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .sell-icon-btn:active {
            background: #5a2020;
            box-shadow: 0 0 10px rgba(248, 81, 73, 0.3);
        }

        .shop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #080c14;
            z-index: 150;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .shop-overlay.show {
            transform: translateY(0);
        }

        .shop-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e2a45;
            background: #0d111f;
            flex-shrink: 0;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
        }

        .shop-title {
            color: #d0daf0;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(200, 210, 255, 0.2);
        }

        .close-btn {
            background: none;
            border: none;
            color: #6b7daa;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            text-shadow: 0 0 8px rgba(100, 140, 255, 0.3);
        }

        .shop-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .shop-item {
            background: #0d111f;
            border: 1px solid #1e2a45;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        .shop-item:active {
            box-shadow: 0 0 20px rgba(100, 140, 255, 0.1);
        }

        .shop-item-emoji {
            font-size: 32px;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.25));
        }

        .shop-item-info {
            flex: 1;
        }
        .shop-item-info h3 {
            color: #d0daf0;
            font-size: 14px;
            margin-bottom: 2px;
            text-shadow: 0 0 5px rgba(200, 210, 255, 0.2);
        }
        .shop-item-info p {
            color: #6b7daa;
            font-size: 11px;
            text-shadow: 0 0 4px rgba(100, 140, 255, 0.2);
        }
        .shop-item-price {
            color: #ffd700;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .buy-btn {
            background: linear-gradient(135deg, #1a3a2a, #238636);
            border: 1px solid #2ea04360;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 0 12px rgba(46, 160, 67, 0.2);
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }
        .buy-btn:active {
            background: linear-gradient(135deg, #238636, #2ea043);
            box-shadow: 0 0 22px rgba(46, 160, 67, 0.5);
        }
        .buy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .balance-topup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 8, 13, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 160;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .balance-topup-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .topup-card {
            background: #0d111f;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            max-width: 300px;
            border: 1px solid #2a3a5c;
            box-shadow: 0 0 30px rgba(100, 140, 255, 0.1);
        }
        .topup-card h3 {
            color: #ffd700;
            margin-bottom: 16px;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .topup-option {
            background: #111827;
            border: 1px solid #2a3a5c;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: #d0daf0;
            font-weight: 600;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
            text-shadow: 0 0 5px rgba(200, 210, 255, 0.2);
        }
        .topup-option:active {
            background: #1a2540;
            box-shadow: 0 0 18px rgba(100, 140, 255, 0.25);
        }
        .topup-option .emoji {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.3));
        }

        .sell-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(6, 8, 13, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 170;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .sell-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .sell-card {
            background: #0d111f;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            max-width: 280px;
            width: 90%;
            border: 1px solid #2a3a5c;
            box-shadow: 0 0 30px rgba(100, 140, 255, 0.1);
        }
        .sell-card .sell-emoji {
            font-size: 56px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            margin-bottom: 8px;
        }
        .sell-card h3 {
            color: #d0daf0;
            font-size: 18px;
            margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(200, 210, 255, 0.2);
        }
        .sell-card .sell-price {
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .sell-buttons {
            display: flex;
            gap: 10px;
        }
        .sell-btn-confirm {
            flex: 1;
            background: linear-gradient(135deg, #5a1a1a, #c0392b);
            border: 1px solid #e74c3c60;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.2);
            transition: all 0.2s;
        }
        .sell-btn-confirm:active {
            box-shadow: 0 0 22px rgba(231, 76, 60, 0.5);
        }
        .sell-btn-cancel {
            flex: 1;
            background: #111827;
            border: 1px solid #2a3a5c;
            color: #a0b4e0;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="balance-container" id="balanceContainer">
                <span class="star-icon">⭐</span>
                <span class="balance" id="balance">1,000</span>
            </div>
            <button class="inventory-btn" id="shopBtn">🎁</button>
        </div>

        <div class="main-content" id="mainContent">
            <div class="gift-selection-row">
                <div class="gift-card current-gift" id="currentGiftCard">
                    <div class="gift-emoji" id="currentGiftEmoji">🌹</div>
                    <div class="gift-name" id="currentGiftName">Роза</div>
                    <div class="gift-price" id="currentGiftPrice">50 ⭐</div>
                </div>
                <div class="gift-card target-gift" id="targetGiftCard">
                    <div class="gift-emoji" id="targetGiftEmoji">💍</div>
                    <div class="gift-name" id="targetGiftName">Кольцо</div>
                    <div class="gift-price" id="targetGiftPrice">200 ⭐</div>
                </div>
            </div>

            <div class="wheel-container" id="wheelContainer">
                <canvas class="wheel-canvas" id="wheelCanvas" width="380" height="380"></canvas>
                <canvas class="spark-canvas" id="sparkCanvas" width="500" height="500"></canvas>
                <div class="chance-display" id="chanceDisplay">
                    <div class="chance-percent" id="chancePercent">23.8%</div>
                    <div class="chance-label">ШАНС</div>
                </div>
                <div class="center-result" id="centerResult">
                    <div class="center-result-text" id="centerResultText">УСПЕХ</div>
                    <div class="center-result-chance" id="centerResultChance"></div>
                </div>
            </div>

            <div class="quick-bet-buttons" id="quickBetButtons">
                <button class="quick-bet-btn" data-fraction="1/2">x2</button>
                <button class="quick-bet-btn" data-fraction="1/4">x4</button>
                <button class="quick-bet-btn" data-fraction="1/8">x8</button>
                <button class="quick-bet-btn" data-fraction="35/100">35%</button>
                <button class="quick-bet-btn" data-fraction="75/100">75%</button>
                <button class="quick-bet-btn" data-fraction="85/100">85%</button>
            </div>

            <button class="upgrade-btn" id="upgradeBtn">UPGRADE</button>

            <div class="lists-row">
                <div class="gift-list-panel" id="inventoryPanel">
                    <div class="gift-list-title">Инвентарь</div>
                    <div id="inventoryList"></div>
                </div>
                <div class="gift-list-panel" id="targetsPanel">
                    <div class="gift-list-title">Выберите подарок</div>
                    <div id="targetsList"></div>
                </div>
            </div>
        </div>

        <div class="shop-overlay" id="shopOverlay">
            <div class="shop-header">
                <span class="shop-title">🎁 Магазин подарков</span>
                <button class="close-btn" id="closeShopBtn">✕</button>
            </div>
            <div class="shop-items" id="shopItems"></div>
        </div>

        <div class="balance-topup-overlay" id="balanceTopupOverlay">
            <div class="topup-card">
                <h3>Пополнить баланс</h3>
                <div class="topup-option" id="topupGifts">
                    <span class="emoji">🎁</span>
                    Подарками в Telegram
                </div>
                <div class="topup-option" id="topupStars">
                    <span class="emoji">⭐</span>
                    Звездами
                </div>
                <button class="close-btn" id="closeTopupBtn" style="margin-top:10px; width:100%;">Отмена</button>
            </div>
        </div>

        <div class="sell-overlay" id="sellOverlay">
            <div class="sell-card">
                <div class="sell-emoji" id="sellEmoji">🌹</div>
                <h3 id="sellName">Роза</h3>
                <div class="sell-price" id="sellPrice">50 ⭐</div>
                <div class="sell-buttons">
                    <button class="sell-btn-confirm" id="sellConfirmBtn">Продать</button>
                    <button class="sell-btn-cancel" id="sellCancelBtn">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = null;
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
        }

        const ALL_GIFTS = [
            { id: 'rose', name: 'Роза', emoji: '🌹', price: 50 },
            { id: 'cake', name: 'Торт', emoji: '🎂', price: 100 },
            { id: 'ring', name: 'Кольцо', emoji: '💍', price: 200 },
            { id: 'crown', name: 'Корона', emoji: '👑', price: 500 },
            { id: 'diamond', name: 'Алмаз', emoji: '💎', price: 1000 },
            { id: 'rocket', name: 'Ракета', emoji: '🚀', price: 2500 },
            { id: 'star_gift', name: 'Звездный дар', emoji: '🌟', price: 5000 },
            { id: 'unicorn', name: 'Единорог', emoji: '🦄', price: 10000 },
            { id: 'dragon', name: 'Дракон', emoji: '🐉', price: 25000 },
            { id: 'phoenix', name: 'Феникс', emoji: '🔥', price: 50000 },
            { id: 'galaxy', name: 'Галактика', emoji: '🌌', price: 100000 },
            { id: 'infinity', name: 'Бесконечность', emoji: '♾️', price: 250000 },
        ];

        class SparkParticle {
            constructor(x, y, vx, vy, life, color, size) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.color = color;
                this.size = size;
                this.gravity = 0.04;
                this.friction = 0.98;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.size *= 0.985;
            }
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.size * 3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            get dead() { return this.life <= 0; }
        }

        class SparkSystem {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.animId = null;
            }
            emit(x, y, count, colors) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.8 + Math.random() * 4;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed - 2;
                    const life = 40 + Math.floor(Math.random() * 50);
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const size = 1.2 + Math.random() * 1.8;
                    this.particles.push(new SparkParticle(x, y, vx, vy, life, color, size));
                }
                if (!this.animId) this.animate();
            }
            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles = this.particles.filter(p => !p.dead);
                for (const p of this.particles) {
                    p.update();
                    p.draw(this.ctx);
                }
                if (this.particles.length > 0) {
                    this.animId = requestAnimationFrame(() => this.animate());
                } else {
                    this.animId = null;
                }
            }
            clear() {
                this.particles = [];
                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }
        }

        class UpgradeGame {
            constructor() {
                this.balance = 1000;
                this.inventory = [
                    { giftId: 'rose', acquiredAt: Date.now() },
                    { giftId: 'cake', acquiredAt: Date.now() - 10000 },
                ];
                this.currentGiftId = 'rose';
                this.targetGiftId = 'ring';
                this.currentChance = 0;
                this.history = [];
                this.isSpinning = false;
                this.audioContext = null;
                this.soundEnabled = false;
                this.wheelAngle = 0;
                this.wheelAnimationId = null;
                this.resultTimeout = null;
                this.sparkSystem = null;
                this.sellTargetGiftId = null;
                this.init();
            }

            get currentGift() { return ALL_GIFTS.find(g => g.id === this.currentGiftId) || ALL_GIFTS[0]; }
            get targetGift() { return ALL_GIFTS.find(g => g.id === this.targetGiftId) || ALL_GIFTS[1]; }
            get inventoryGifts() {
                const seen = new Set();
                return this.inventory.filter(e => { if (seen.has(e.giftId)) return false;
                    seen.add(e.giftId); return true; }).map(e => ALL_GIFTS.find(g => g.id === e.giftId)).filter(Boolean);
            }

            calculateChance(cp, tp) { return cp >= tp ? 0 : (cp / tp) * 0.95; }
            getPotentialTargets() { return ALL_GIFTS.filter(g => g.price > this.currentGift.price); }

            findTargetByFraction(fr) {
                const [n, d] = fr.split('/').map(Number);
                const tc = n / d;
                const cPrice = this.currentGift.price;
                const cands = ALL_GIFTS.filter(g => g.price > cPrice);
                if (!cands.length) return null;
                let best = cands[0], bd = Infinity;
                for (const g of cands) { const diff = Math.abs(this.calculateChance(cPrice, g.price) - tc); if (diff < bd) { bd = diff;
                        best = g; } }
                return best;
            }

            async init() {
                this.loadFromStorage();
                this.deduplicateInventory();
                if (!this.inventory.find(e => e.giftId === this.currentGiftId)) this.currentGiftId = this.inventory[0]?.giftId || 'rose';
                this.autoSelectTarget();
                this.sparkSystem = new SparkSystem(document.getElementById('sparkCanvas'));
                this.setupEventListeners();
                this.renderAll();
            }

            deduplicateInventory() { const s = new Set(); const u = []; for (const e of this.inventory) { if (!s.has(e.giftId)) { s.add(e.giftId);
                        u.push(e); } } this.inventory = u; }

            autoSelectTarget() { const t = this.getPotentialTargets(); if (t.length && !t.find(x => x.id === this.targetGiftId)) this.targetGiftId = t[0].id;
                this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price); }

            loadFromStorage() { try { const s = localStorage.getItem('upgrade_stars_v6'); if (s) { const d = JSON.parse(s);
                        this.balance = d.balance || 1000;
                        this.inventory = d.inventory || [{ giftId: 'rose', acquiredAt: Date.now() }];
                        this.history = d.history || [];
                        this.currentGiftId = d.currentGiftId || this.inventory[0]?.giftId || 'rose';
                        this.targetGiftId = d.targetGiftId || 'ring'; } } catch (e) {} }
            saveToStorage() { try { localStorage.setItem('upgrade_stars_v6', JSON.stringify({ balance: this.balance,
                        inventory: this.inventory, history: this.history.slice(0, 30), currentGiftId: this.currentGiftId,
                        targetGiftId: this.targetGiftId })); } catch (e) {} }

            setupEventListeners() {
                document.getElementById('upgradeBtn').addEventListener('click', () => this.startUpgrade());
                document.querySelectorAll('.quick-bet-btn').forEach(b => b.addEventListener('click', e => { const f = e.target.dataset.fraction;
                    const g = this.findTargetByFraction(f); if (g) { this.targetGiftId = g.id;
                        this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                        this.renderAll();
                        this.highlightQuickButton(f); } }));
                document.getElementById('currentGiftCard').addEventListener('click', () => { const ig = this.inventoryGifts; if (ig.length <= 1) return; const ci = ig.findIndex(g => g.id === this.currentGiftId);
                    this.currentGiftId = ig[(ci + 1) % ig.length].id;
                    this.autoSelectTarget();
                    this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                    this.renderAll();
                    this.saveToStorage(); });
                document.getElementById('targetGiftCard').addEventListener('click', () => { const t = this.getPotentialTargets(); if (t.length <= 1) return; const ci = t.findIndex(g => g.id === this.targetGiftId);
                    this.targetGiftId = t[(ci + 1) % t.length].id;
                    this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                    this.renderAll();
                    this.saveToStorage(); });
                document.getElementById('balanceContainer').addEventListener('click', () => document.getElementById('balanceTopupOverlay').classList.add('show'));
                document.getElementById('closeTopupBtn').addEventListener('click', () => document.getElementById('balanceTopupOverlay').classList.remove('show'));
                document.getElementById('topupGifts').addEventListener('click', () => { alert('🔜 Функция пополнения подарками Telegram будет доступна с интеграцией бота.'); document.getElementById('balanceTopupOverlay').classList.remove('show'); });
                document.getElementById('topupStars').addEventListener('click', () => { this.balance += 500;
                    this.renderAll();
                    this.saveToStorage(); document.getElementById('balanceTopupOverlay').classList.remove('show'); if (tg) tg.HapticFeedback.notificationOccurred('success'); });
                document.getElementById('shopBtn').addEventListener('click', () => { document.getElementById('shopOverlay').classList.add('show');
                    this.renderShop(); });
                document.getElementById('closeShopBtn').addEventListener('click', () => document.getElementById('shopOverlay').classList.remove('show'));
                document.getElementById('inventoryList').addEventListener('click', e => { const it = e.target.closest('.gift-list-item'); if (!it) return; const gid = it.dataset.giftId; if (gid && this.inventory.find(en => en.giftId === gid)) { this.currentGiftId = gid;
                        this.autoSelectTarget();
                        this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                        this.renderAll();
                        this.saveToStorage(); } });
                document.getElementById('targetsList').addEventListener('click', e => { const it = e.target.closest('.gift-list-item'); if (!it) return; const gid = it.dataset.giftId; const tgt = ALL_GIFTS.find(g => g.id === gid); if (tgt && tgt.price > this.currentGift.price) { this.targetGiftId = gid;
                        this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                        this.renderAll();
                        this.saveToStorage(); } });
                document.getElementById('sellConfirmBtn').addEventListener('click', () => this.confirmSell());
                document.getElementById('sellCancelBtn').addEventListener('click', () => this.closeSellOverlay());
                document.getElementById('sellOverlay').addEventListener('click', e => { if (e.target === document.getElementById('sellOverlay')) this.closeSellOverlay(); });
                document.body.addEventListener('click', () => { if (!this.soundEnabled) this.initAudio(); }, { once: true });
            }

            openSellOverlay(giftId) {
                const gift = ALL_GIFTS.find(g => g.id === giftId);
                if (!gift || !this.inventory.find(e => e.giftId === giftId)) return;
                if (this.inventory.length <= 1) {
                    alert('Нельзя продать последний подарок!');
                    return;
                }
                this.sellTargetGiftId = giftId;
                document.getElementById('sellEmoji').textContent = gift.emoji;
                document.getElementById('sellName').textContent = gift.name;
                document.getElementById('sellPrice').textContent = gift.price + ' ⭐';
                document.getElementById('sellOverlay').classList.add('show');
            }

            closeSellOverlay() {
                document.getElementById('sellOverlay').classList.remove('show');
                this.sellTargetGiftId = null;
            }

            confirmSell() {
                if (!this.sellTargetGiftId) return;
                const gift = ALL_GIFTS.find(g => g.id === this.sellTargetGiftId);
                if (!gift) return;
                const idx = this.inventory.findIndex(e => e.giftId === this.sellTargetGiftId);
                if (idx === -1) return;
                if (this.inventory.length <= 1) {
                    alert('Нельзя продать последний подарок!');
                    this.closeSellOverlay();
                    return;
                }
                this.inventory.splice(idx, 1);
                this.balance += gift.price;
                if (this.currentGiftId === this.sellTargetGiftId) {
                    this.currentGiftId = this.inventory[0]?.giftId || 'rose';
                    this.autoSelectTarget();
                    this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                }
                this.saveToStorage();
                this.renderAll();
                this.closeSellOverlay();
                if (tg) tg.HapticFeedback.notificationOccurred('success');
            }

            highlightQuickButton(fr) { document.querySelectorAll('.quick-bet-btn').forEach(b => b.classList.remove('active')); const btn = document.querySelector(`.quick-bet-btn[data-fraction="${fr}"]`); if (btn) btn.classList.add('active'); }

            async initAudio() { try { this.audioContext = new(window.AudioContext || window.webkitAudioContext)(); await this.audioContext.resume();
                    this.soundEnabled = true; } catch (e) {} }
            playBeep(f, d, ty = 'sine') { if (!this.audioContext || !this.soundEnabled) return; const o = this.audioContext.createOscillator(); const g = this.audioContext.createGain();
                o.connect(g);
                g.connect(this.audioContext.destination);
                o.frequency.value = f;
                o.type = ty;
                g.gain.setValueAtTime(0.05, this.audioContext.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + d);
                o.start();
                o.stop(this.audioContext.currentTime + d); }

            showResultText(success, chance) {
                const chanceDisplay = document.getElementById('chanceDisplay');
                const centerResult = document.getElementById('centerResult');
                const resultText = document.getElementById('centerResultText');
                const resultChance = document.getElementById('centerResultChance');
                chanceDisplay.classList.add('hidden-temp');
                if (success) {
                    resultText.textContent = 'УСПЕХ!';
                    resultText.style.color = '#5ff57a';
                    resultText.style.textShadow = '0 0 20px #5ff57a, 0 0 40px #3fb950';
                    resultChance.textContent = `Шанс: ${(chance*100).toFixed(1)}%`;
                    resultChance.style.color = '#5ff57a';
                } else {
                    resultText.textContent = 'ПРОВАЛ!';
                    resultText.style.color = '#ff6b6b';
                    resultText.style.textShadow = '0 0 20px #ff6b6b, 0 0 40px #f85149';
                    resultChance.textContent = `Шанс: ${(chance*100).toFixed(1)}%`;
                    resultChance.style.color = '#ff6b6b';
                }
                resultText.style.animation = 'none';
                resultText.offsetHeight;
                resultText.style.animation = 'result-pop 0.4s ease-out';
                centerResult.classList.add('show');
                const sc = document.getElementById('sparkCanvas');
                const cx = sc.width / 2;
                const cy = sc.height / 2;
                const colors = success ?
                    ['#5ff57a', '#3fb950', '#a5f5b0', '#ffffff', '#7dff90'] :
                    ['#ff6b6b', '#f85149', '#ff9999', '#ffffff', '#ff4444'];
                this.sparkSystem.emit(cx, cy, 50, colors);
                if (this.resultTimeout) clearTimeout(this.resultTimeout);
                this.resultTimeout = setTimeout(() => {
                    centerResult.classList.remove('show');
                    chanceDisplay.classList.remove('hidden-temp');
                }, 2000);
            }

            startUpgrade() {
                if (this.isSpinning || !this.inventory.find(e => e.giftId === this.currentGiftId) || this.currentGift.price >= this.targetGift.price) return;
                this.isSpinning = true;
                const btn = document.getElementById('upgradeBtn');
                btn.disabled = true;
                btn.classList.add('spinning');
                btn.textContent = 'КРУТИМ...';
                if (tg) tg.HapticFeedback.impactOccurred('heavy');
                const totalRot = 5 + Math.floor(Math.random() * 5);
                const ta = Math.random() * Math.PI * 2;
                const totalAngle = totalRot * Math.PI * 2 + ta;
                const dur = 4000, st = Date.now(), sa = this.wheelAngle;
                const ease = t => 1 - Math.pow(1 - t, 3);
                const anim = () => { const el = Date.now() - st, p = Math.min(el / dur, 1), ep = ease(p);
                    this.wheelAngle = sa + totalAngle * ep;
                    this.drawWheel(); if (this.soundEnabled && p < 0.9 && Math.floor(p * 40) % 2 === 0) this.playBeep(200 + (1 - ep) * 800, 0.01); if (p < 1) this.wheelAnimationId = requestAnimationFrame(anim);
                    else this.onSpinComplete(); };
                this.wheelAnimationId = requestAnimationFrame(anim);
            }

            onSpinComplete() { this.isSpinning = false; const btn = document.getElementById('upgradeBtn');
                btn.classList.remove('spinning');
                btn.textContent = 'UPGRADE';
                btn.disabled = false; const na = ((this.wheelAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2); const se = this.currentChance * Math.PI * 2; const win = na <= se; const sc = this.currentChance; if (win) this.onUpgradeSuccess(sc); else this.onUpgradeFail(sc); }

            onUpgradeSuccess(sc) { const og = this.currentGift, ng = this.targetGift; const idx = this.inventory.findIndex(e => e.giftId === og.id); if (idx !== -1) this.inventory.splice(idx, 1); if (!this.inventory.find(e => e.giftId === ng.id)) this.inventory.push({ giftId: ng.id,
                        acquiredAt: Date.now() });
                this.currentGiftId = ng.id;
                this.autoSelectTarget();
                this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                this.history.unshift({ from: og.id, to: ng.id, chance: sc, success: true, time: Date.now() });
                this.saveToStorage();
                this.renderAll();
                this.showResultText(true, sc); if (tg) tg.HapticFeedback.notificationOccurred('success');
                this.playBeep(1500, 0.2);
                setTimeout(() => this.playBeep(1800, 0.15), 150); }

            onUpgradeFail(sc) { const og = this.currentGift, tgf = this.targetGift; const idx = this.inventory.findIndex(e => e.giftId === og.id); if (idx !== -1) this.inventory.splice(idx, 1); if (!this.inventory.length) this.inventory.push({ giftId: 'rose',
                    acquiredAt: Date.now() });
                this.currentGiftId = this.inventory[0].giftId;
                this.autoSelectTarget();
                this.currentChance = this.calculateChance(this.currentGift.price, this.targetGift.price);
                this.history.unshift({ from: og.id, to: tgf.id, chance: sc, success: false, time: Date.now() });
                this.saveToStorage();
                this.renderAll();
                this.showResultText(false, sc); if (tg) tg.HapticFeedback.notificationOccurred('error');
                this.playBeep(200, 0.3, 'sawtooth'); }

            renderAll() {
                document.getElementById('balance').textContent = this.balance.toLocaleString();
                document.getElementById('currentGiftEmoji').textContent = this.currentGift.emoji;
                document.getElementById('currentGiftName').textContent = this.currentGift.name;
                document.getElementById('currentGiftPrice').textContent = this.currentGift.price + ' ⭐';
                document.getElementById('targetGiftEmoji').textContent = this.targetGift.emoji;
                document.getElementById('targetGiftName').textContent = this.targetGift.name;
                document.getElementById('targetGiftPrice').textContent = this.targetGift.price + ' ⭐';
                const cp = (this.currentChance * 100).toFixed(1);
                document.getElementById('chancePercent').textContent = cp + '%';
                this.drawWheel();
                this.renderInventoryList();
                this.renderTargetsList();
                const ub = document.getElementById('upgradeBtn'); if (!this.isSpinning) { ub.disabled = false;
                    ub.classList.remove('spinning');
                    ub.textContent = 'UPGRADE'; }
            }

            drawWheel() {
                const c = document.getElementById('wheelCanvas');
                const ctx = c.getContext('2d');
                const w = c.width, h = c.height, cx = w / 2, cy = h / 2;
                const or = Math.min(w, h) / 2 - 10, rw = 24, ir = or - rw, cr = ir - 5;
                ctx.clearRect(0, 0, w, h);
                ctx.beginPath();
                ctx.arc(cx, cy, or, 0, Math.PI * 2);
                ctx.arc(cx, cy, ir, 0, Math.PI * 2, true);
                ctx.closePath();
                ctx.fillStyle = '#111827';
                ctx.fill();
                ctx.strokeStyle = '#2a3a5c';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowColor = 'rgba(100,140,255,0.3)';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;
                if (this.currentChance > 0) {
                    const sa = -Math.PI / 2, ea = -Math.PI / 2 + this.currentChance * Math.PI * 2;
                    ctx.beginPath();
                    ctx.arc(cx, cy, or - 2, sa, ea);
                    ctx.arc(cx, cy, ir + 2, ea, sa, true);
                    ctx.closePath();
                    const grad = ctx.createLinearGradient(cx - or, cy - or, cx + or, cy + or);
                    grad.addColorStop(0, '#f0883e');
                    grad.addColorStop(0.5, '#f5c842');
                    grad.addColorStop(1, '#ffd700');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.shadowColor = 'rgba(240,136,62,0.5)';
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.arc(cx, cy, ir, 0, Math.PI * 2);
                ctx.strokeStyle = '#2a3a5c';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(100,140,255,0.2)';
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(cx, cy, or, 0, Math.PI * 2);
                ctx.strokeStyle = '#2a3a5c';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(100,140,255,0.2)';
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                ctx.fillStyle = '#080c14';
                ctx.fill();
                ctx.strokeStyle = '#2a3a5c';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, cr - 4, 0, Math.PI * 2);
                ctx.strokeStyle = '#1a2540';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(this.wheelAngle);
                const abr = ir + rw * 0.55, atr = or + 10;
                const abx = 0, aby = -abr, atx = 0, aty = -atr;
                ctx.beginPath();
                ctx.moveTo(abx, aby);
                ctx.lineTo(atx, aty);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(atx, aty);
                ctx.lineTo(-8, aty + 12);
                ctx.lineTo(8, aty + 12);
                ctx.closePath();
                ctx.fillStyle = '#ffd700';
                ctx.fill();
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(atx, aty, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(abx, aby, 4.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.fill();
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
                const rg = ctx.createRadialGradient(cx - or * 0.2, cy - or * 0.2, or * 0.04, cx, cy, or);
                rg.addColorStop(0, 'rgba(255,255,255,0.05)');
                rg.addColorStop(0.5, 'rgba(255,255,255,0.01)');
                rg.addColorStop(1, 'rgba(0,0,0,0.2)');
                ctx.beginPath();
                ctx.arc(cx, cy, or, 0, Math.PI * 2);
                ctx.arc(cx, cy, ir, 0, Math.PI * 2, true);
                ctx.closePath();
                ctx.fillStyle = rg;
                ctx.fill();
            }

            renderInventoryList() {
                const c = document.getElementById('inventoryList');
                const ig = this.inventoryGifts;
                if (!ig.length) { c.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7daa;font-size:12px;">Пусто</div>'; return; }
                c.innerHTML = ig.map(g => `
                    <div class="gift-list-item" data-gift-id="${g.id}" style="${g.id===this.currentGiftId?'background:#111827;border-left:3px solid #ffd700;box-shadow:inset 0 0 15px rgba(255,215,0,0.05);':''}">
                        <span class="gift-emoji-small">${g.emoji}</span>
                        <div class="gift-list-item-info"><div class="gift-list-item-name">${g.name}</div><div class="gift-list-item-price">${g.price} ⭐</div></div>
                        <button class="sell-icon-btn" data-gift-id="${g.id}">Sell</button>
                    </div>`).join('');
                c.querySelectorAll('.sell-icon-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        const gid = btn.dataset.giftId;
                        this.openSellOverlay(gid);
                    });
                });
            }

            renderTargetsList() {
                const c = document.getElementById('targetsList');
                const t = this.getPotentialTargets();
                if (!t.length) { c.innerHTML = '<div style="padding:20px;text-align:center;color:#6b7daa;font-size:12px;">Нет целей</div>'; return; }
                c.innerHTML = t.map(g => {
                    return `
                    <div class="gift-list-item" data-gift-id="${g.id}" style="${g.id===this.targetGiftId?'background:#111827;border-left:3px solid #f0883e;box-shadow:inset 0 0 15px rgba(240,136,62,0.05);':''}">
                        <span class="gift-emoji-small">${g.emoji}</span>
                        <div class="gift-list-item-info"><div class="gift-list-item-name">${g.name}</div><div class="gift-list-item-price">${g.price} ⭐</div></div>
                    </div>`;
                }).join('');
            }

            renderShop() {
                const c = document.getElementById('shopItems');
                c.innerHTML = ALL_GIFTS.map(g => `
                    <div class="shop-item">
                        <span class="shop-item-emoji">${g.emoji}</span>
                        <div class="shop-item-info"><h3>${g.name}</h3><p>Подарок для апгрейда</p></div>
                        <div style="text-align:right;"><div class="shop-item-price">${g.price} ⭐</div>
                        <button class="buy-btn" data-gift-id="${g.id}" ${this.balance<g.price?'disabled':''}>Купить</button></div>
                    </div>`).join('');
                c.querySelectorAll('.buy-btn').forEach(b => b.addEventListener('click', e => { const gid = e.target.dataset.giftId; const g = ALL_GIFTS.find(x => x.id === gid); if (g && this.balance >= g.price) { this.balance -= g.price; if (!this.inventory.find(en => en.giftId === g.id)) this.inventory.push({ giftId: g.id,
                        acquiredAt: Date.now() });
                    this.deduplicateInventory();
                    this.saveToStorage();
                    this.renderAll();
                    this.renderShop(); if (tg) tg.HapticFeedback.notificationOccurred('success'); } }));
            }
        }

        const game = new UpgradeGame();

        function setVH() { const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`); }
        setVH();
        window.addEventListener('resize', setVH);
    </script>
</body>
</html>
