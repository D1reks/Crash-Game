<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UPGIFT • Gift Upgrade Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-spinner"></div>
            <div class="preloader-text">UPGIFT</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-left">
                <span class="header-logo">UPGIFT</span>
            </div>
            <div class="header-right">
                <div class="balance-container" id="balanceContainer">
                    <span class="star-icon"></span>
                    <span class="balance" id="balance">1,000</span>
                </div>
                <button class="settings-btn" id="settingsBtn">
                    <svg class="settings-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" fill="#0a0f1a"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M11.1 1.1L10.5 0H13.5L12.9 1.1C13.5 1.3 14.1 1.5 14.6 1.8L15.6 1.3L17.2 2.9L16.7 3.9C17.1 4.4 17.4 5 17.7 5.6L18.9 6.2L18.9 8.2L17.7 8.8C17.4 9.4 17.1 10 16.7 10.5L17.2 11.5L15.6 13.1L14.6 12.6C14.1 12.9 13.5 13.1 12.9 13.3L13.5 14.4H10.5L11.1 13.3C10.5 13.1 9.9 12.9 9.4 12.6L8.4 13.1L6.8 11.5L7.3 10.5C6.9 10 6.6 9.4 6.3 8.8L5.1 8.2V6.2L6.3 5.6C6.6 5 6.9 4.4 7.3 3.9L6.8 2.9L8.4 1.3L9.4 1.8C9.9 1.5 10.5 1.3 11.1 1.1Z" stroke="#0a0f1a" stroke-width="1.5"/>
                    </svg>
                </button>
                <button class="icon-btn" id="shopBtn">
                    <img src="images/shop_icon.png" alt="Shop" class="icon-img">
                </button>
            </div>
        </div>

        <div class="gift-selection-row">
            <div class="gift-card-wrapper">
                <div class="gift-card current-gift" id="currentGiftCard"></div>
                <div class="gift-info-outside">
                    <div class="gift-name-outside" id="currentGiftNameOutside"></div>
                    <div class="gift-price-outside" id="currentGiftPriceOutside"></div>
                </div>
            </div>
            <div class="gift-card-wrapper">
                <div class="gift-card target-gift" id="targetGiftCard"></div>
                <div class="gift-info-outside">
                    <div class="gift-name-outside" id="targetGiftNameOutside"></div>
                    <div class="gift-price-outside" id="targetGiftPriceOutside"></div>
                </div>
            </div>
        </div>

        <div class="wheel-container" id="wheelContainer">
            <canvas class="wheel-canvas" id="wheelCanvas" width="380" height="380"></canvas>
            <canvas class="spark-canvas" id="sparkCanvas" width="500" height="500"></canvas>
            <div class="chance-display" id="chanceDisplay">
                <div class="chance-percent" id="chancePercent">0%</div>
                <div class="chance-label">ШАНС</div>
            </div>
            <div class="center-result" id="centerResult">
                <div class="center-result-text" id="centerResultText">УСПЕХ</div>
                <div class="center-result-chance" id="centerResultChance"></div>
            </div>
        </div>

        <div class="quick-bet-buttons" id="quickBetButtons">
            <button class="quick-bet-btn" data-fraction="1/2">x2</button>
            <button class="quick-bet-btn" data-fraction="1/4">x4</button>
            <button class="quick-bet-btn" data-fraction="1/8">x8</button>
            <button class="quick-bet-btn" data-fraction="35/100">35%</button>
            <button class="quick-bet-btn" data-fraction="55/100">55%</button>
            <button class="quick-bet-btn" data-fraction="75/100">75%</button>
        </div>

        <button class="upgrade-btn" id="upgradeBtn" disabled>
            Прокачать
        </button>

        <div class="lists-row">
            <div class="gift-list-panel" id="inventoryPanel">
                <div class="gift-list-title">Инвентарь</div>
                <div id="inventoryList"></div>
            </div>
            <div class="gift-list-panel" id="targetsPanel">
                <div class="gift-list-title">Прокачать до</div>
                <div id="targetsList"></div>
            </div>
        </div>

        <!-- Settings overlay -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-card">
                <h3>Настройки</h3>
                
                <div class="settings-section">
                    <h4>Кнопки по коэффициенту</h4>
                    <div class="settings-row">
                        <input type="number" id="settingCoef1" min="2" max="100">
                        <input type="number" id="settingCoef2" min="2" max="100">
                        <input type="number" id="settingCoef3" min="2" max="100">
                    </div>
                </div>
                
                <div class="settings-section">
                    <h4>Кнопки по проценту (%)</h4>
                    <div class="settings-row">
                        <input type="number" id="settingPerc1" min="1" max="99">
                        <input type="number" id="settingPerc2" min="1" max="99">
                        <input type="number" id="settingPerc3" min="1" max="99">
                    </div>
                </div>
                
                <div class="settings-section">
                    <h4>Звук в апгрейде</h4>
                    <div class="settings-radio-group" id="soundSettings">
                        <div class="settings-radio-item" data-value="on">
                            <input type="radio" name="sound" id="soundOn" value="on" checked>
                            <label for="soundOn">Включен<br><span class="radio-desc">Звуковые эффекты включены</span></label>
                        </div>
                        <div class="settings-radio-item" data-value="off">
                            <input type="radio" name="sound" id="soundOff" value="off">
                            <label for="soundOff">Выключен<br><span class="radio-desc">Беззвучный режим</span></label>
                        </div>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h4>Тип прокрутки</h4>
                    <div class="settings-radio-group" id="spinSettings">
                        <div class="settings-radio-item" data-value="normal">
                            <input type="radio" name="spinType" id="spinNormal" value="normal" checked>
                            <label for="spinNormal">Обычная<br><span class="radio-desc">Стрелка крутится медленно</span></label>
                        </div>
                        <div class="settings-radio-item" data-value="fast">
                            <input type="radio" name="spinType" id="spinFast" value="fast">
                            <label for="spinFast">Ускоренная<br><span class="radio-desc">Быстрая прокрутка</span></label>
                        </div>
                    </div>
                </div>
                
                <button class="settings-save-btn" id="settingsSaveBtn">Сохранить и закрыть</button>
            </div>
        </div>

        <div class="shop-overlay" id="shopOverlay">
            <div class="shop-header">
                <span class="shop-title">Магазин подарков</span>
                <button class="close-btn" id="closeShopBtn">✕</button>
            </div>
            <div class="shop-items" id="shopItems"></div>
        </div>

        <div class="balance-topup-overlay" id="balanceTopupOverlay">
            <div class="topup-card">
                <h3>Пополнить баланс</h3>
                <div class="topup-option" id="topupGifts">
                    Подарками в Telegram
                </div>
                <div class="topup-option" id="topupStars">
                    Звездами
                </div>
                <button class="close-btn" id="closeTopupBtn" style="margin-top:10px; width:100%;">Отмена</button>
            </div>
        </div>

        <div class="sell-overlay" id="sellOverlay">
            <div class="sell-card">
                <div class="sell-emoji" id="sellEmoji"></div>
                <h3 id="sellName"></h3>
                <div class="sell-price" id="sellPrice"></div>
                <div class="sell-buttons">
                    <button class="sell-btn-confirm" id="sellConfirmBtn">Продать</button>
                    <button class="sell-btn-cancel" id="sellCancelBtn">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
