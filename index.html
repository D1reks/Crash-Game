<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UPGIFT • Gift Upgrade Game</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-spinner"></div>
            <div class="preloader-text">UPGIFT</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="header-left">
                <span class="header-logo">UPGIFT</span>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="shopBtn">
                    <img src="images/shop_icon.png" alt="Shop" class="icon-img">
                </button>
                <div class="balance-container" id="balanceContainer">
                    <span class="star-icon"></span>
                    <span class="balance" id="balance">1,000</span>
                </div>
            </div>
        </div>

        <div class="gift-selection-row">
            <div class="gift-card-wrapper">
                <div class="gift-card current-gift" id="currentGiftCard"></div>
                <div class="gift-info-outside">
                    <div class="gift-name-outside" id="currentGiftNameOutside"></div>
                    <div class="gift-price-outside" id="currentGiftPriceOutside"></div>
                </div>
            </div>
            <div class="gift-card-wrapper">
                <div class="gift-card target-gift" id="targetGiftCard"></div>
                <div class="gift-info-outside">
                    <div class="gift-name-outside" id="targetGiftNameOutside"></div>
                    <div class="gift-price-outside" id="targetGiftPriceOutside"></div>
                </div>
            </div>
        </div>

        <button class="upgrade-btn" id="upgradeBtn" disabled>Прокачать</button>

        <div class="quick-bet-row">
            <div class="quick-bet-buttons" id="quickBetButtons">
                <button class="quick-bet-btn" data-fraction="1/2">x2</button>
                <button class="quick-bet-btn" data-fraction="1/4">x4</button>
                <button class="quick-bet-btn" data-fraction="1/8">x8</button>
                <button class="quick-bet-btn" data-fraction="35/100">35%</button>
                <button class="quick-bet-btn" data-fraction="55/100">55%</button>
                <button class="quick-bet-btn" data-fraction="75/100">75%</button>
            </div>
            <button class="quick-bet-settings-btn" id="settingsBtn">
                <img src="images/icon-settings.png" alt="Settings" class="settings-img">
            </button>
        </div>

        <div class="lists-row">
            <div class="gift-list-panel" id="giftListPanel">
                <div class="tab-header">
                    <div class="tab-btn active" id="tabInventory">Инвентарь</div>
                    <div class="tab-btn" id="tabTargets">Прокачать до</div>
                </div>
                <div id="giftListContent"></div>
            </div>
        </div>

        <!-- Модальное колесо -->
        <div class="wheel-modal-overlay" id="wheelModalOverlay">
            <div class="wheel-modal-content">
                <div class="wheel-container-modal" id="wheelContainer">
                    <canvas class="wheel-canvas-modal" id="wheelCanvas" width="380" height="380"></canvas>
                    <canvas class="spark-canvas-modal" id="sparkCanvas" width="500" height="500"></canvas>
                    <div class="wheel-modal-chance" id="wheelModalChance">0%</div>
                    <div class="wheel-modal-chance-label" id="wheelModalChanceLabel">ШАНС</div>
                    <div class="center-result-modal" id="centerResult">
                        <div class="center-result-text-modal" id="centerResultText">УСПЕХ</div>
                        <div class="center-result-chance-modal" id="centerResultChance"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Настройки -->
        <div class="settings-overlay" id="settingsOverlay">
            <div class="settings-card">
                <h3>Настройки</h3>
                <div class="settings-section">
                    <h4>Быстрый коэффициент</h4>
                    <div class="settings-row">
                        <input type="number" id="settingCoef1" min="2" max="100" placeholder="2">
                        <input type="number" id="settingCoef2" min="2" max="100" placeholder="4">
                        <input type="number" id="settingCoef3" min="2" max="100" placeholder="8">
                    </div>
                </div>
                <div class="settings-section">
                    <h4>Быстрый процент</h4>
                    <div class="settings-row">
                        <input type="number" id="settingPerc1" min="1" max="99" placeholder="35">
                        <input type="number" id="settingPerc2" min="1" max="99" placeholder="55">
                        <input type="number" id="settingPerc3" min="1" max="99" placeholder="75">
                    </div>
                </div>
                <div class="settings-section">
                    <h4>Звук в приложении</h4>
                    <div class="settings-radio-group" id="soundSettings">
                        <div class="settings-radio-item" data-value="on">
                            <input type="radio" name="sound" id="soundOn" value="on" checked>
                            <label for="soundOn">Включен<br><span class="radio-desc">Звуковые эффекты включены</span></label>
                        </div>
                        <div class="settings-radio-item" data-value="off">
                            <input type="radio" name="sound" id="soundOff" value="off">
                            <label for="soundOff">Выключен<br><span class="radio-desc">Беззвучный режим</span></label>
                        </div>
                    </div>
                </div>
                <div class="settings-section">
                    <h4>Прокрутка</h4>
                    <div class="settings-radio-group" id="spinSettings">
                        <div class="settings-radio-item" data-value="normal">
                            <input type="radio" name="spinType" id="spinNormal" value="normal" checked>
                            <label for="spinNormal">Обычная<br><span class="radio-desc">Стрелка крутится медленно</span></label>
                        </div>
                        <div class="settings-radio-item" data-value="fast">
                            <input type="radio" name="spinType" id="spinFast" value="fast">
                            <label for="spinFast">Ускоренная<br><span class="radio-desc">Быстрая прокрутка</span></label>
                        </div>
                    </div>
                </div>
                <button class="settings-save-btn" id="settingsSaveBtn">Сохранить и закрыть</button>
            </div>
        </div>

        <!-- Магазин -->
        <div class="shop-overlay" id="shopOverlay">
            <div class="shop-header">
                <span class="shop-title">Магазин подарков</span>
                <button class="close-btn" id="closeShopBtn">✕</button>
            </div>
            <div class="shop-search-row">
                <div class="shop-search-input-wrapper">
                    <input type="text" class="shop-search-input" id="shopSearchInput" placeholder="Поиск подарков...">
                </div>
                <div class="shop-sort-btns">
                    <button class="shop-sort-btn active" id="sortAsc">↑</button>
                    <button class="shop-sort-btn" id="sortDesc">↓</button>
                </div>
            </div>
            <div class="shop-items" id="shopItems"></div>
        </div>

        <!-- Модалка покупки -->
        <div class="buy-modal-overlay" id="buyModalOverlay">
            <div class="buy-modal-card">
                <img class="buy-modal-icon" id="buyModalIcon" src="" alt="">
                <div class="buy-modal-name" id="buyModalName"></div>
                <div class="buy-modal-price" id="buyModalPrice"></div>
                <div class="buy-modal-buttons">
                    <button class="buy-modal-confirm" id="buyModalConfirm">Купить</button>
                    <button class="buy-modal-cancel" id="buyModalCancel">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Пополнение баланса -->
        <div class="balance-topup-overlay" id="balanceTopupOverlay">
            <div class="topup-card">
                <h3>Пополнить баланс</h3>
                <div class="topup-custom-select" id="topupCustomSelect">
                    <div class="topup-select-header" id="topupSelectHeader">
                        <img class="topup-select-icon" id="topupSelectIcon" src="images/deposit_stars_icon.png" alt="">
                        <span class="topup-select-text" id="topupSelectText">Звезды Telegram</span>
                        <span class="topup-select-arrow">▼</span>
                    </div>
                    <div class="topup-select-dropdown">
                        <div class="topup-select-option" data-value="stars" data-icon="images/deposit_stars_icon.png">
                            <img src="images/deposit_stars_icon.png" alt=""> Звезды Telegram
                        </div>
                        <div class="topup-select-option" data-value="gifts" data-icon="images/gifts icons/Plush Pepe.png">
                            <img src="images/gifts icons/Plush Pepe.png" alt=""> Подарками Telegram
                        </div>
                        <div class="topup-select-option" data-value="ton" data-icon="images/deposit_ton_icon.png">
                            <img src="images/deposit_ton_icon.png" alt=""> TON
                        </div>
                    </div>
                </div>
                <button class="topup-confirm-btn" id="topupConfirmBtn">Пополнить</button>
                <button class="topup-cancel-btn" id="closeTopupBtn">Отмена</button>
            </div>
        </div>

        <!-- Продажа -->
        <div class="sell-overlay" id="sellOverlay">
            <div class="sell-card">
                <div class="sell-emoji" id="sellEmoji"></div>
                <h3 id="sellName"></h3>
                <div class="sell-price" id="sellPrice"></div>
                <div class="sell-buttons">
                    <button class="sell-btn-confirm" id="sellConfirmBtn">Продать</button>
                    <button class="sell-btn-cancel" id="sellCancelBtn">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
